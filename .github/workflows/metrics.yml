# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ── Authentication ──────────────────────────────────────────────
          # METRICS_TOKEN must be a classic token with these scopes:
          #   read:user  → achievements (queries sponsorshipsAsSponsor via GraphQL)
          #   repo       → languages indepth (clones private repos to analyze them)
          # Go to: GitHub → Settings → Developer settings → Personal access tokens (classic)
          token: ${{ secrets.METRICS_TOKEN }}

          # ── Identity & output ───────────────────────────────────────────
          user: DazedNConfused-
          template: classic
          filename: github-metrics.svg
          output_action: commit
          config_timezone: America/Buenos_Aires
          config_animations: yes

          # ── Base sections ───────────────────────────────────────────────
          base: header, activity, community, repositories, metadata
          base_hireable: no
          repositories: 100
          repositories_forks: yes
          repositories_affiliations: owner, collaborator, organization_member

          # ── Isometric calendar ──────────────────────────────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Languages ───────────────────────────────────────────────────
          # Requires `repo` scope on METRICS_TOKEN to clone and analyze private repos.
          # Without it indepth finds nothing ("No push activity found").
          # Remove the two `plugin_languages_indepth` lines to fall back to the
          # GitHub API's per-repo primary-language mode (no extra scope needed).
          commits_authoring: DazedNConfused-, GLopez@Signiant.com, gonzalo.lopez@wbdcontractor.com, gonzalo.lopez@wbconsultant.com, gonzalo.lopez@super7ui.com, gvigliante@mobeats.io, glopezvigliante@gmail.com
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_ignored: C++, C#, HTML, Visual Basic, PLSQL
          plugin_languages_skipped: CoverAO

          # ── Coding habits ───────────────────────────────────────────────
          # Disabled: the plugin scrapes public push events from the GitHub events API.
          # Private repo activity is invisible without repo scope, so the event window
          # returns 0 push events, which causes an internal crash (Math.max on an
          # empty set → -Infinity propagating through the renderer). Once repo scope
          # is added to the token and the languages section starts working, re-enable
          # this by uncommenting the lines below.
          # plugin_habits: yes
          # plugin_habits_from: 200
          # plugin_habits_days: 30
          # plugin_habits_facts: yes
          # plugin_habits_charts: no

          # ── Lines of code ───────────────────────────────────────────────
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_repositories_limit: 4

          # ── Issue & PR follow-up ────────────────────────────────────────
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

          # ── Reactions ───────────────────────────────────────────────────
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_limit_issues: 100
          plugin_reactions_days: 365
          plugin_reactions_display: relative
          plugin_reactions_details: percentage
          
          # ── Achievements ────────────────────────────────────────────────
          # Requires `read:user` scope on METRICS_TOKEN.
          # The GraphQL query accesses sponsorshipsAsSponsor which is behind that gate.
          # Without it the query throws → "Unexpected error".
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

          # ── Notable contributions ────────────────────────────────────────
          # plugin_notable_self: no → excludes your own DazedNConfused- repos.
          # plugin_notable_from: all → catches org repos AND external user repos.
          # plugin_notable_types broadened to also surface PRs/issues, not just commits.
          plugin_notable: yes
          plugin_notable_self: no
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes

          # ── Topics ──────────────────────────────────────────────────────
          # icons mode: renders the topic's official logo. Topics without an icon
          # are silently omitted, so limit is set to 20 to account for that.
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # ── Recently starred ─────────────────────────────────────────────
          plugin_stars: yes
          plugin_stars_limit: 4
